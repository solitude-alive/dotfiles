# CI template for Python projects.

name: ci

# Triggers on push and PR to main/dev branches.
on:
  pull_request:
    branches: [ main, dev ]
  push:
    branches: [ main, dev ]

jobs:
  # Runs all pre-commit hooks (linting, formatting, hygiene checks).
  # Uses pre-commit/action to cache hook environments automatically.
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: pre-commit/action@v3.0.1
